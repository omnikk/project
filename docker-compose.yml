services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salon_backend
    volumes:
      - salon_data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: salon_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  salon_data: